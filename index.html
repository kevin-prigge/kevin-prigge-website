<head>
  <meta charset="UTF-8" />

  <title>Kevin Prigge — Systems Engineer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      background: #1E1710;
      color: #FAF8F4;
      font-family: 'Inter', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100svh;
      text-align: center;
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 70% 55% at 50% 50%, rgba(184,149,106,.08) 0%, transparent 68%);
      pointer-events: none;
    }
    .monogram {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.8rem, 9vw, 5.5rem);
      font-weight: 700;
      color: #B8956A;
      line-height: 1;
      margin-bottom: 1.5rem;
      letter-spacing: -.02em;
    }
    .divider {
      width: 2px;
      height: 44px;
      background: linear-gradient(to bottom, transparent, #B8956A 40%, transparent);
      margin: 0 auto 1.5rem;
      border-radius: 2px;
    }
    .name {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.5rem, 4.5vw, 2.6rem);
      font-weight: 600;
      color: #FAF8F4;
      margin-bottom: .45rem;
      letter-spacing: -.01em;
    }
    .title {
      font-size: clamp(.8rem, 2vw, .95rem);
      font-weight: 400;
      color: rgba(250,248,244,.4);
      letter-spacing: .16em;
      text-transform: uppercase;
      margin-bottom: 2.75rem;
    }
    .coming-soon-wrap {
      display: flex;
      align-items: center;
      gap: .8rem;
      margin-bottom: 3rem;
    }
    .cs-line {
      width: 32px;
      height: 1px;
      background: rgba(184,149,106,.35);
    }
    .cs-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #B8956A;
      animation: blink 2.2s ease-in-out infinite;
      flex-shrink: 0;
    }
    .cs-dot:last-of-type { animation-delay: .4s; }
    @keyframes blink {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: .3; transform: scale(.65); }
    }
    .cs-text {
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: rgba(250,248,244,.3);
    }
    .socials {
      display: flex;
      gap: 1rem;
      align-items: center;
    }
    .socials a {
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      border: 1px solid rgba(250,248,244,.12);
      color: rgba(250,248,244,.4);
      transition: border-color .2s, color .2s, transform .2s;
      text-decoration: none;
    }
    .socials a svg { width: 17px; height: 17px; fill: currentColor; }
    .socials a:hover { border-color: #B8956A; color: #B8956A; transform: translateY(-2px); }
    .copyright {
      position: absolute;
      bottom: 1.75rem;
      font-size: .72rem;
      color: rgba(250,248,244,.18);
      letter-spacing: .06em;
    }
  </style>
